# Generated for cv-ats-job-finder on Fly.io
app = "cv-ats-job-finder"
primary_region = "sin"        # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false   # keep alive for scheduler
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 40

[[mounts]]
  source      = "cv_data"
  destination = "/data"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
