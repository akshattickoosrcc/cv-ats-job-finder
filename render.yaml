services:
  - type: web
    name: cv-ats-job-finder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app -c gunicorn.conf.py
    plan: free
    healthCheckPath: /api/ping
    envVars:
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
      # RENDER_EXTERNAL_URL is injected automatically by Render with the
      # correct URL for THIS service — do not hardcode it (a stale value
      # breaks the keep-alive self-ping and causes cold-start spin-downs).
      - key: RENDER
        value: true
